<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}">
  {{ $style := resources.Get "css/style.css" }}
  <link rel="stylesheet" href="{{ $style.Permalink }}">
  <link rel="icon" href="{{ "favicon.png" | absURL }}">
  <script src="https://cdn.counter.dev/script.js" data-id="f8fbe812-6f87-4221-8fd8-1b126af484a2" data-utcoffset="-8"></script>
  {{ with .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">
  {{ end }}
</head>
